# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/misd


spring.datasource.username=Admin
spring.datasource.password=PHlpostMISD**
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP Connection Pool ──────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
# 0 = disabled (no leak-detection warnings)
spring.datasource.hikari.leak-detection-threshold=0
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.auto-commit=true

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# Release DB connections when the service method ends, not at end of HTTP request.
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# Removed spring.jpa.properties.hibernate.dialect — Spring Boot 4.x auto-detects
# MySQL 8 dialect. Keeping the old MySQLDialect caused the version 5.5.5 warning.

# Disable SQL logging in production — show-sql=true floods logs and
# slightly slows down every query because Hibernate formats each statement.
# Set to true only when actively debugging a query.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── File Upload (Excel import) ────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.location=${java.io.tmpdir}

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8082
server.address=0.0.0.0

# ── Session Security ─────────────────────────────────────────────────────────
# Session timeout in seconds (30 minutes)
server.servlet.session.timeout=1800
# Use secure cookies (requires HTTPS)
server.servlet.session.cookie.secure=false
# HttpOnly cookies prevent XSS from accessing session cookies
server.servlet.session.cookie.http-only=true
# SameSite cookie policy prevents CSRF
server.servlet.session.cookie.same-site=lax

# ── Session Tracking ────────────────────────────────────────────────────────
# Enable session tracking for online users feature
app.session.tracking.enabled=true






# ── SSE async timeout (must be >= SSE emitter timeout of 3 minutes) ───────────
spring.mvc.async.request-timeout=180000

# ── Spring Cache (Caffeine) ───────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.cache-names=userByEmail,connectivityStats
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ── Logging ───────────────────────────────────────────────────────────────────
# Keep these at WARN in normal operation — DEBUG fills logs fast and adds latency.
# Switch back to DEBUG only when troubleshooting a specific issue.
logging.level.org.springframework.web=WARN
logging.level.com.pps.profilesystem=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=ERROR