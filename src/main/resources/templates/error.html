<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - PPS Profile System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/users-management.css}">
</head>
<body class="bg-light">
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="row">
            <div class="col-lg-12 text-center">
                <div class="error mx-auto" th:attr="data-text=${status != null ? status : '500'}"
                     th:text="${status != null ? status : '500'}">500</div>
                <p class="lead text-gray-800 mb-5" th:text="${error != null ? error : 'Error'}">Internal Server Error</p>
                <p class="text-gray-500 mb-0">It looks like something went wrong...</p>
                <p class="text-gray-500 mb-4">Please check the database connection or try again later.</p>
                <a href="/dashboard" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2"></i>Return to Dashboard
                </a>
                <div class="mt-4">
                    <small class="text-muted d-block" th:if="${path != null}">
                        Path: <span th:text="${path}">/</span>
                    </small>
                    <small class="text-muted">
                        Error details:
                        <span th:text="${(message != null and !#strings.isEmpty(message)) ? message : (error != null ? error : 'Unknown error')}">Unknown error</span>
                    </small>
                </div>
            </div>
        </div>
    </div>
    
    <style>
        .error {
            font-size: 7rem;
            position: relative;
            line-height: 1;
            width: 12.5rem;
        }
        .error:before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            color: #eee;
            z-index: -1;
        }
        .error:after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            color: #ddd;
            z-index: -2;
        }
    </style>
</body>
</html>
