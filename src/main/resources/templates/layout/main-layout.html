<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:fragment="layout(title, content)">
<head>
    
    <!-- Favicon -->
    <link rel="icon" th:href="@{/images/favicon-32x32.png}" type="image/png" sizes="32x32">
    <link rel="icon" th:href="@{/images/favicon-16x16.png}" type="image/png" sizes="16x16">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- ✅ Prevent browser from caching authenticated pages.
         After logout, pressing Back will re-request from server → redirected to login. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title th:replace="${title}">PHLPost Profile System</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
         integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
         crossorigin=""/>
    
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <!-- DataTables CSS -->
    <link th:if="${activePage == 'table' or activePage == 'quarters' or activePage == 'users' or activePage == 'archive' or activePage == 'dashboard' or activePage == 'report'}" 
          rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar-dropdown.css}">
    <link rel="stylesheet" th:href="@{/css/notifications.css}">
    
    <!-- Page-specific CSS -->
    <link th:if="${activePage == 'dashboard'}" rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link th:if="${activePage == 'table'}" rel="stylesheet" th:href="@{/css/table.css}">
    <link th:if="${activePage == 'table'}" rel="stylesheet" th:href="@{/css/table-custom.css}">
    <link th:if="${activePage == 'notifications'}" rel="stylesheet" th:href="@{/css/notifications-inbox.css}">
    <link th:if="${activePage == 'users'}" rel="stylesheet" th:href="@{/css/users-management.css}">
    <link rel="stylesheet" th:href="@{/css/main-layout.css}">

</head>

<body>

    <!-- Loading Spinner for Users Page -->
    <div th:if="${activePage == 'users'}" class="spinner-overlay" id="loadingSpinner">
        <div class="spinner-border text-light" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Page Wrapper -->
    <div class="page-wrapper">
        
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        
        <!-- Sidebar -->
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <!-- Main Content Area -->
        <div class="main-content">
            
            <!-- Header -->
            <div th:replace="~{fragments/header :: header}" class="main-header"></div>

            <!-- Main Body Content -->
            <main class="main-body">
                <div th:replace="${content}"></div>
            </main>

            <!-- Footer -->
            <div th:replace="~{fragments/footer :: footer}" class="main-footer"></div>
            
        </div>


    <!-- Edit Postal Office Modal -->
    <div th:if="${activePage == 'table' or activePage == 'profile' or activePage == 'dashboard' or activePage == 'quarters'}" th:replace="~{fragments/modals/edit-modal :: editModal}"></div>

    <!-- ── Office Profile Popup Modal (used by table & quarters name links) ── -->
    <div class="modal fade" id="officeProfilePopupModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content" style="border-radius:12px;overflow:hidden;">
                <div class="modal-header py-3 px-4"
                     style="background:linear-gradient(135deg,#002868,#1a3a7a);color:#fff;border:none;">
                    <h5 class="modal-title mb-0">
                        <i class="fas fa-building mr-2"></i>
                        <span id="officeProfilePopupName">Office Profile</span>
                    </h5>
                    <button type="button" class="close text-white ml-2" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body p-0" id="officeProfilePopupBody">
                    <div class="d-flex align-items-center justify-content-center" style="height:300px;">
                        <div class="text-center text-muted">
                            <i class="fas fa-spinner fa-spin fa-2x mb-2 d-block"></i>
                            Loading profile...
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="background:#f8f9fa;">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times mr-1"></i>Close
                    </button>
                    <a id="officeProfileOpenFull" href="#" class="btn btn-primary">
                        <i class="fas fa-external-link-alt mr-1"></i>View Full Profile
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    
    <!-- 1. jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- 2. Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" defer></script>
    
    <!-- 3. Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" defer></script>

    <!-- 4. SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- 5. Sidebar toggle + main-content margin sync -->
    <script th:src="@{/js/sidebar-toggle.js}"></script>

    <!-- 6. Office Profile Popup — renders office data inline via API (no iframe) -->
    <script th:src="@{/js/office-profile-popup.js}"></script>
    
    <!-- 7. Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

    <!-- 8. Dashboard JS -->
    <script th:if="${activePage == 'dashboard'}" th:src="@{/js/dashboard.js}"></script>
    
    <!-- 9. DataTables JS -->
    <script th:if="${activePage == 'table' or activePage == 'quarters' or activePage == 'users' or activePage == 'archive' or activePage == 'dashboard' or activePage == 'report'}" 
            src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js" defer></script>
    
    <!-- 10. Table JS -->
    <script th:if="${activePage == 'table'}" th:src="@{/js/table.js}"></script>
   
   <!-- 10.1. Edit Modal JS (photos helpers must load after edit-modal.js — defines window.openModal) -->
   <script th:if="${activePage == 'table' or activePage == 'dashboard' or activePage == 'quarters' or activePage == 'profile'}" th:src="@{/js/edit-modal.js}"></script>
   <script th:if="${activePage == 'table' or activePage == 'dashboard' or activePage == 'quarters' or activePage == 'profile'}" th:src="@{/js/edit-modal-photos.js}"></script>
   
   <!-- 11. Quarters JS -->
   <script th:if="${activePage == 'quarters'}" th:src="@{/js/quarters.js}"></script>
   
   <!-- 12. Users Management JS -->
   <script th:if="${activePage == 'users'}" th:src="@{/js/users-management.js}"></script>

   <!-- 13. Archive JS -->
   <script th:if="${activePage == 'archive' or activePage == 'table' or activePage == 'dashboard'}" th:src="@{/js/archive.js}"></script>

   <!-- 14. Insert Office Wizard JS -->
   <script th:if="${activePage == 'insert'}" th:src="@{/js/insert-office-wizard.js}"></script>

   <!-- 15. Profile JS -->
   <script th:if="${activePage == 'profile'}" th:src="@{/js/profile.js}"></script>

   <!-- 16. Session Timeout -->
   <script th:src="@{/js/session-timeout.js}"></script>

   <!-- 17. Sidebar Dropdown -->
   <script th:src="@{/js/sidebar-dropdown.js}"></script>

   <!-- 18. Notifications -->
   <script th:src="@{/js/notifications.js}"></script>
   <script th:if="${activePage == 'notifications'}" th:src="@{/js/notifications-inbox.js}"></script>

   <!-- 19. Navigation Performance Optimizer -->
   <script th:src="@{/js/navigation-optimizer.js}"></script>

   <!-- 20. SheetJS (xlsx) -->
   <script th:if="${activePage == 'report'}" src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>

   <!-- 21. Report JS -->
   <script th:if="${activePage == 'report'}" th:src="@{/js/report.js}" defer></script>

   <!-- 22. User Profile JS (My Profile page) -->
   <script th:if="${activePage == 'my-profile'}" th:src="@{/js/user-profile.js}"></script>

   <!-- 23. Bootstrap tooltip init — runs after jQuery & Bootstrap are loaded.
            Covers: insert-office page ISP/connection tooltips,
                    edit modal ISP/connection tooltips. -->
   <script th:if="${activePage == 'insert' or activePage == 'table' or activePage == 'profile' or activePage == 'dashboard'}" 
           th:src="@{/js/global-tooltips.js}"></script>

</body>
</html>
