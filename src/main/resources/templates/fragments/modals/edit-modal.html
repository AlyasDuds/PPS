<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="editModal" class="modal fade" id="editOfficeModal" tabindex="-1" role="dialog">



    <script th:inline="javascript">

        window.CURRENT_USER_ROLE_ID = /*[[${loggedInRoleId}]]*/ null;

        window.CURRENT_USER_AREA_ID = /*[[${loggedInAreaId}]]*/ null;

    </script>



    <div class="modal-dialog modal-lg" role="document">

        <div class="modal-content">

            <div class="modal-header bg-warning text-white">

                <h5 class="modal-title">

                    <i class="fas fa-edit"></i> Edit Post Office

                </h5>

                <button type="button" class="close text-white" data-dismiss="modal">

                    <span>&times;</span>

                </button>

            </div>

            <div class="modal-body">

                <form id="editOfficeForm">

                    <input type="hidden" id="editOfficeId">

                    <input type="hidden" id="editAreaIdHidden">



                    <!-- Full sections: Photos, Basic Info, Location, Coordinates -->
                    <!-- Visible on all non-quarters pages to ALL roles -->
                    <div th:if="${activePage != 'quarters'}">



                    <!-- ── Photos ─────────────────────────────────────────── -->

                    <h6 class="mt-2 mb-2 text-primary">

                        <i class="fas fa-camera mr-1"></i>Photos

                    </h6>

                    <div id="editPhotoSection">

                        <div class="row" id="editPhotoSlots">

                            <!-- Profile Photo -->

                            <div class="col-sm-6 col-md-3 mb-3">

                                <label style="font-size:.78rem;font-weight:600;color:#5a5c69;display:block;margin-bottom:4px;">

                                    <i class="fas fa-user-circle mr-1"></i> Profile Photo

                                </label>

                                <div class="edit-photo-box" id="editProfileBox" data-type="profile">

                                    <div class="edit-photo-placeholder" id="editProfilePlaceholder">

                                        <i class="fas fa-cloud-upload-alt"></i>

                                        <span>Upload</span>

                                    </div>

                                    <img id="editProfilePreview" class="edit-photo-preview" style="display:none" alt="">

                                    <div class="edit-photo-overlay">

                                        <label class="edit-photo-change-btn" for="editProfileInput">

                                            <i class="fas fa-camera"></i>

                                        </label>

                                        <button type="button" class="edit-photo-delete-btn" data-type="profile" style="display:none">

                                            <i class="fas fa-trash"></i>

                                        </button>

                                    </div>

                                </div>

                                <input type="file" id="editProfileInput" accept="image/*" style="display:none"

                                       onchange="editModalUploadPhoto(this,'profile',0)">

                            </div>

                            <!-- Cover Photo 1 -->

                            <div class="col-sm-6 col-md-3 mb-3">

                                <label style="font-size:.78rem;font-weight:600;color:#5a5c69;display:block;margin-bottom:4px;">

                                    <i class="fas fa-image mr-1"></i> Cover Photo 1

                                </label>

                                <div class="edit-photo-box" id="editCover1Box" data-type="cover" data-slot="1">

                                    <div class="edit-photo-placeholder" id="editCover1Placeholder">

                                        <i class="fas fa-cloud-upload-alt"></i>

                                        <span>Upload</span>

                                    </div>

                                    <img id="editCover1Preview" class="edit-photo-preview" style="display:none" alt="">

                                    <div class="edit-photo-overlay">

                                        <label class="edit-photo-change-btn" for="editCover1Input">

                                            <i class="fas fa-camera"></i>

                                        </label>

                                        <button type="button" class="edit-photo-delete-btn" data-type="cover" data-slot="1" style="display:none">

                                            <i class="fas fa-trash"></i>

                                        </button>

                                    </div>

                                </div>

                                <input type="file" id="editCover1Input" accept="image/*" style="display:none"

                                       onchange="editModalUploadPhoto(this,'cover',1)">

                            </div>

                            <!-- Cover Photo 2 -->

                            <div class="col-sm-6 col-md-3 mb-3">

                                <label style="font-size:.78rem;font-weight:600;color:#5a5c69;display:block;margin-bottom:4px;">

                                    <i class="fas fa-image mr-1"></i> Cover Photo 2

                                </label>

                                <div class="edit-photo-box" id="editCover2Box" data-type="cover" data-slot="2">

                                    <div class="edit-photo-placeholder" id="editCover2Placeholder">

                                        <i class="fas fa-cloud-upload-alt"></i>

                                        <span>Upload</span>

                                    </div>

                                    <img id="editCover2Preview" class="edit-photo-preview" style="display:none" alt="">

                                    <div class="edit-photo-overlay">

                                        <label class="edit-photo-change-btn" for="editCover2Input">

                                            <i class="fas fa-camera"></i>

                                        </label>

                                        <button type="button" class="edit-photo-delete-btn" data-type="cover" data-slot="2" style="display:none">

                                            <i class="fas fa-trash"></i>

                                        </button>

                                    </div>

                                </div>

                                <input type="file" id="editCover2Input" accept="image/*" style="display:none"

                                       onchange="editModalUploadPhoto(this,'cover',2)">

                            </div>

                            <!-- Cover Photo 3 -->

                            <div class="col-sm-6 col-md-3 mb-3">

                                <label style="font-size:.78rem;font-weight:600;color:#5a5c69;display:block;margin-bottom:4px;">

                                    <i class="fas fa-image mr-1"></i> Cover Photo 3

                                </label>

                                <div class="edit-photo-box" id="editCover3Box" data-type="cover" data-slot="3">

                                    <div class="edit-photo-placeholder" id="editCover3Placeholder">

                                        <i class="fas fa-cloud-upload-alt"></i>

                                        <span>Upload</span>

                                    </div>

                                    <img id="editCover3Preview" class="edit-photo-preview" style="display:none" alt="">

                                    <div class="edit-photo-overlay">

                                        <label class="edit-photo-change-btn" for="editCover3Input">

                                            <i class="fas fa-camera"></i>

                                        </label>

                                        <button type="button" class="edit-photo-delete-btn" data-type="cover" data-slot="3" style="display:none">

                                            <i class="fas fa-trash"></i>

                                        </button>

                                    </div>

                                </div>

                                <input type="file" id="editCover3Input" accept="image/*" style="display:none"

                                       onchange="editModalUploadPhoto(this,'cover',3)">

                            </div>

                        </div>

                    </div>



                    <!-- ── Basic Information ──────────────────────────────── -->

                    <h6 class="mt-3 mb-2 text-primary">

                        <i class="fas fa-info-circle mr-1"></i>Basic Information

                    </h6>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editName">Post Office Name <span class="text-danger">*</span></label>

                                <input type="text" class="form-control" id="editName" required>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editPostmaster">Postmaster</label>

                                <input type="text" class="form-control" id="editPostmaster">

                            </div>

                        </div>

                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="editContactPerson">Postal Office Contact Person</label>
                                <input type="text" class="form-control" id="editContactPerson">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="editContactNumber">Postal Office Contact Number</label>
                                <input type="text" class="form-control" id="editContactNumber">
                            </div>
                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editClassification">

                                    Classification

                                    <span data-toggle="tooltip" data-placement="top"

                                          title="Type of postal office classification based on operations and services."

                                         style="margin-left:5px;">

                                        <i class="fas fa-info-circle text-muted" style="font-size:11px;"></i>

                                    </span>

                                </label>

                                <select class="form-control" id="editClassification">

                                    <option value="">-- Select Classification --</option>

                                    <option value="Regular">Regular</option>

                                    <option value="Extension">Extension</option>

                                    <option value="Delivery">Delivery</option>

                                    <option value="Non-Delivery">Non-Delivery</option>

                                    <option value="Acceptance with Delivery">Acceptance with Delivery</option>

                                    <option value="Acceptance">Acceptance</option>

                                    <option value="Mother">Mother</option>

                                    <option value="Personnel Handling Delivery">Personnel Handling Delivery</option>

                                    <option value="Post Shop">Post Shop</option>

                                    <option value="Campus">Campus</option>

                                    <option value="Mall Based">Mall Based</option>

                                    <option value="Postal Station - LGU">Postal Station - LGU</option>

                                    <option value="Barangay Based">Barangay Based</option>

                                    <option value="Private">Private</option>

                                </select>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editServiceProvided">

                                    Services Provided

                                    <span data-toggle="tooltip" data-placement="top"

                                          title="Main postal services offered at this location."

                                         style="margin-left:5px;">

                                        <i class="fas fa-info-circle text-muted" style="font-size:11px;"></i>

                                    </span>

                                </label>

                                <select class="form-control" id="editServiceProvided">

                                    <option value="">-- Select Service --</option>

                                    <option value="Delivery">Delivery</option>

                                    <option value="Acceptance">Acceptance</option>

                                    <option value="Acceptance and Delivery">Acceptance and Delivery</option>

                                </select>

                            </div>

                        </div>

                    </div>

                    <!-- ── Address ───────────────────────────────────────── -->

                    <h6 class="mt-3 mb-2 text-primary">

                        <i class="fas fa-address-card mr-1"></i>Address

                    </h6>

                    <div class="form-group">

                        <label for="editAddress">Complete Address</label>

                        <textarea class="form-control" id="editAddress" rows="2"></textarea>

                    </div>



                    <!-- ── Location ───────────────────────────────────────── -->

                    <h6 class="mt-3 mb-2 text-primary">

                        <i class="fas fa-map-marker-alt mr-1"></i>Location

                    </h6>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editAreaId">Area</label>

                                <select class="form-control" id="editAreaId">

                                    <option value="">-- Select Area --</option>

                                </select>

                            </div>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editProvinceId">Province</label>

                                <select class="form-control" id="editProvinceId" disabled>

                                    <option value="">-- Select Province --</option>

                                </select>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editCityMunId">City / Municipality</label>

                                <select class="form-control" id="editCityMunId" disabled>

                                    <option value="">-- Select City/Municipality --</option>

                                </select>

                            </div>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editBarangayId">Barangay</label>

                                <select class="form-control" id="editBarangayId" disabled>

                                    <option value="">-- Select Barangay --</option>

                                </select>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editZipCode">Zip Code</label>

                                <input type="text" class="form-control" id="editZipCode">

                            </div>

                        </div>

                    </div>



                    <!-- ── Coordinates ────────────────────────────────────── -->

                    <h6 class="mt-3 mb-2 text-primary">

                        <i class="fas fa-crosshairs mr-1"></i>Coordinates

                    </h6>

                    <div class="row">

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editLatitude">Latitude</label>

                                <input type="number" class="form-control" id="editLatitude" step="0.000001">

                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="form-group">

                                <label for="editLongitude">Longitude</label>

                                <input type="number" class="form-control" id="editLongitude" step="0.000001">

                            </div>

                        </div>

                    </div>



                    </div><!-- end non-quarters sections: Photos, Basic Info, Location, Coordinates -->

                    <!-- ══════════════════════════════════════════════════════

                         CONNECTIVITY — visible to ALL roles (Admin, Area Admin, User)
                         Shown on ALL pages including quarters

                         ══════════════════════════════════════════════════ -->

                    <div>

                        <h6 class="mt-3 mb-2 text-primary">

                            <i class="fas fa-wifi mr-1"></i>Operational Status

                        </h6>



                        <div class="row mb-3">

                            <!-- Connection Status -->

                            <div class="col-md-6">

                                <div class="form-group">

                                    <label for="editStatus">

                                        <i class="fa-solid fa-circle-check mr-1 text-primary"></i>

                                        Connection Status <span class="text-danger">*</span>

                                    </label>

                                    <select class="form-control" id="editStatus" required>

                                        <option value="true">Active</option>

                                        <option value="false">Inactive</option>

                                    </select>

                                </div>

                            </div>



                            <!-- Office Status -->

                            <div class="col-md-6">

                                <div class="form-group">

                                    <label for="editOfficeStatus">

                                        <i class="fas fa-door-open mr-1 text-info"></i>

                                        Office Availability <small class="text-muted"></small>

                                    </label>

                                    <select class="form-control" id="editOfficeStatus">

                                        <option value="">-- Select --</option>

                                        <option value="OPEN">OPEN</option>

                                        <option value="CLOSED">CLOSED</option>

                                        <option value="TBD">TBD</option>

                                    </select>

                                </div>

                            </div>

                        </div>



                        <!-- ISP + Connection details -->

                        <div class="row">

                            <div class="col-md-4">

                                <div class="form-group">

                                    <label for="editISP">

                                        <i class="fas fa-network-wired mr-1"></i> Internet Service Provider

                                        <span data-toggle="tooltip" data-placement="top"

                                              title="The company providing internet service to this post office (e.g. PLDT, Globe, Converge)."

                                              style="margin-left:5px;">

                                            <i class="fas fa-info-circle text-muted" style="font-size:11px;"></i>

                                        </span>

                                    </label>

                                    <select class="form-control" id="editISP">

                                        <option value="">-- Select ISP --</option>

                                        <option value="PLDT">PLDT</option>

                                        <option value="Globe">Globe</option>

                                        <option value="Smart">Smart</option>

                                        <option value="Converge">Converge</option>

                                        <option value="Sky Broadband">Sky Broadband</option>

                                        <option value="Eastern Telecoms">Eastern Telecoms</option>

                                        <option value="Radius Telecoms">Radius Telecoms</option>

                                        <option value="Others">Others</option>

                                    </select>

                                </div>

                            </div>

                            <div class="col-md-4">

                                <div class="form-group">

                                    <label for="editTypeOfConnection">

                                        <i class="fas fa-plug mr-1"></i> Type of Connection

                                        <span data-toggle="tooltip" data-placement="top"

                                              title="The physical medium used for internet connectivity (e.g. Fiber — fastest and most reliable; DSL — uses phone line; Wireless — radio signal; Satellite — for remote areas)."

                                            style="margin-left:5px;">

                                            <i class="fas fa-info-circle text-muted" style="font-size:11px;"></i>

                                        </span>

                                    </label>

                                    <select class="form-control" id="editTypeOfConnection">

                                        <option value="">-- Select Type --</option>

                                        <option value="Fiber">Fiber Optic</option>

                                        <option value="DSL">DSL</option>

                                        <option value="Cable">Cable</option>

                                        <option value="Wireless">Wireless</option>

                                        <option value="Satellite">Satellite</option>

                                    </select>

                                </div>

                            </div>

                            <div class="col-md-4">

                                <div class="form-group">

                                    <label for="editIPAddressType">

                                        <i class="fas fa-network-wired mr-1"></i> IP Address Type

                                        <span data-toggle="tooltip" data-placement="top"

                                              title="Dynamic IP changes each time you connect, Static IP stays the same."

                                           style="margin-left:5px;">

                                            <i class="fas fa-info-circle text-muted" style="font-size:11px;"></i>

                                        </span>

                                    </label>

                                    <select class="form-control" id="editIPAddressType">

                                        <option value="">Select IP Address Type</option>

                                        <option value="dynamic">Dynamic IP</option>

                                        <option value="static">Static IP</option>

                                        <option value="not_sure">Not sure</option>

                                    </select>

                                </div>

                            </div>

                        </div>

                    </div>



                    <!-- ── Staff Information — visible on non-quarters pages ── -->
                    <div th:if="${activePage != 'quarters'}">

                    <h6 class="mt-3 mb-2 text-primary">

                        <i class="fas fa-users mr-1"></i>Staff Information

                    </h6>

                    <div class="row">

                        <div class="col-md-4">

                            <div class="form-group">

                                <label for="editNoOfEmployees">No. of Employees</label>

                                <input type="number" class="form-control" id="editNoOfEmployees" min="0">

                            </div>

                        </div>

                        <div class="col-md-4">

                            <div class="form-group">

                                <label for="editNoOfTellers">No. of Tellers</label>

                                <input type="number" class="form-control" id="editNoOfTellers" min="0">

                            </div>

                        </div>

                        <div class="col-md-4">

                            <div class="form-group">

                                <label for="editNoOfCarriers">No. of Carriers</label>

                                <input type="number" class="form-control" id="editNoOfCarriers" min="0">

                            </div>

                        </div>

                    </div>



                    <!-- ── Remarks ─────────────────────────────────────────── -->

                    <h6 class="mt-3 mb-2 text-primary">

                        <i class="fas fa-sticky-note mr-1"></i>Remarks

                    </h6>

                    <div class="form-group">

                        <label for="editRemarks">Remarks / Notes</label>

                        <textarea class="form-control" id="editRemarks" rows="3"

                                  placeholder="Any additional notes or remarks..."></textarea>

                    </div>



                    </div><!-- end staff and remarks -->

                    </div><!-- end staff-remarks non-quarters -->



                    <!-- ── Scoped Styles ──────────────────────────────────── -->

                    <link rel="stylesheet" href="/css/edit-modal-photos.css">



                    <style>

                        /* Show N/A placeholder in a muted italic style so users can

                           clearly distinguish "no data in DB" from an empty editable field */

                        #editOfficeForm input::placeholder,

                        #editOfficeForm textarea::placeholder {

                            color: #adb5bd;

                            font-style: italic;

                        }

                    </style>



                </form>

                <div class="modal-footer">

                    <button type="button" class="btn btn-danger mr-auto" id="editModalArchiveBtn"

                            sec:authorize="hasRole('ADMIN')">

                        <i class="fas fa-archive"></i> Archive

                    </button>

                    <button type="button" class="btn btn-secondary" data-dismiss="modal">

                        <i class="fas fa-times"></i> Cancel

                    </button>

                    <button type="button" class="btn btn-warning" onclick="saveOfficeChanges()">

                        <i class="fas fa-save"></i> Save Changes

                    </button>

                </div>

            

        </div>

    </div>



    <!-- Photo upload JS: main-layout loads /js/edit-modal-photos.js after jQuery and edit-modal.js -->

    <!-- Tooltip init handled by main-layout.html script #23 -->



</div>

</html>
