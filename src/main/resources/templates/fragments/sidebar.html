<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="sidebar" id="sidebar">

    <!-- Sidebar Brand/Logo with Burger Toggle -->
    <div class="sidebar-brand">
        <!--
            FIX 1: Removed onclick="return false;" — it was blocking event propagation
                    and causing the browser to evaluate two competing handlers.
            FIX 2: Added data-target="#sidebar" so the JS handler below needs
                    zero DOM queries on every click (no getElementById overhead).
        -->
        <button class="sidebar-burger-toggle" id="sidebarBurgerToggle" type="button" data-target="sidebar">
            <i class="fas fa-bars"></i>
        </button>
        <a th:href="@{/dashboard}" class="d-flex flex-column align-items-center justify-content-center" style="text-decoration: none; padding-top: 5px;">
            <img th:src="@{/assets/images/phlpostlogo.png}" alt="PHLPost Logo"
                style="height: 38px; margin-bottom: 2px;">
            <span style="font-size: 11px; font-family: Helvetica, Arial, sans-serif; font-weight: 800; color: #002868; letter-spacing: 0.5px; white-space: nowrap;">Postal Profile</span>
        </a>
    </div>

    <!-- Sidebar Menu -->
    <div class="sidebar-menu">

        <!-- General Section -->
        <div class="sidebar-heading">General</div>

        <a th:href="@{/dashboard}" class="sidebar-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
            data-page="dashboard">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
        </a>

        <a th:href="@{/table}" class="sidebar-link" th:classappend="${activePage == 'table'} ? 'active' : ''"
            data-page="table">
            <i class="fas fa-map-marked-alt"></i>
            <span>Postal Office Locator</span>
        </a>

        <a th:href="@{/quarters}" class="sidebar-link" th:classappend="${activePage == 'quarters'} ? 'active' : ''"
            data-page="quarters">
            <i class="fas fa-wifi"></i>
            <span>Internet Connectivity</span>
        </a>

        <!-- Reports Section -->
        <div class="sidebar-heading">Reports</div>

        <a th:href="@{/report}" class="sidebar-link" th:classappend="${activePage == 'report'} ? 'active' : ''"
            data-page="report" sec:authorize="hasRole('ADMIN') or hasRole('AREA_ADMIN') or hasRole('SRD_OPERATION')">
            <i class="fas fa-file-alt"></i>
            <span>Connectivity Report</span>
        </a>

        <a href="#" class="sidebar-link" style="opacity: 0.6; cursor: not-allowed;">
            <i class="fas fa-chart-line"></i>
            <span>GCG</span>
        </a>

        <a href="#" class="sidebar-link" style="opacity: 0.6; cursor: not-allowed;">
            <i class="fas fa-balance-scale"></i>
            <span>COA</span>
        </a>

        <!-- Divider -->
        <hr class="sidebar-divider">

        <!-- Actions Section -->
        <div class="sidebar-heading">Actions</div>

        <a th:href="@{/insert}" class="sidebar-link" th:classappend="${activePage == 'insert'} ? 'active' : ''"
            data-page="insert">
            <i class="fas fa-plus"></i>
            <span>Add New Postal Office</span>
        </a>

        <!-- ADMIN-only links -->
        <div sec:authorize="hasRole('ADMIN') or hasRole('AREA_ADMIN') or hasRole('SRD_OPERATION')">
            <hr class="sidebar-divider">
            <div class="sidebar-heading">Admin</div>

            <!-- Manage Users - System Admin only -->
            <a th:href="@{/users}" class="sidebar-link" th:classappend="${activePage == 'users'} ? 'active' : ''"
                data-page="users" sec:authorize="hasRole('ADMIN')">
                <i class="fas fa-users-cog"></i>
                <span>Manage Users</span>
            </a>

            <a th:href="@{/notifications}" class="sidebar-link"
                th:classappend="${activePage == 'notifications'} ? 'active' : ''" data-page="notifications"
                sec:authorize="hasAnyRole('ADMIN','AREA_ADMIN','SRD_OPERATION')">
                <i class="fas fa-bell"></i>
                <span>Notifications</span>
                <span id="sidebarNotifBadge" class="sidebar-notification-badge" style="display:none;background:#dc3545;color:#fff;
                             font-size:10px;padding:2px 6px;border-radius:10px;
                             margin-left:auto;min-width:18px;text-align:center;
                             font-weight:700;line-height:1.2;"></span>
            </a>

            <a th:href="@{/approvals}" class="sidebar-link"
                th:classappend="${activePage == 'approvals'} ? 'active' : ''" data-page="approvals"
                sec:authorize="hasRole('AREA_ADMIN') or hasRole('SRD_OPERATION')">
                <i class="fas fa-clipboard-check"></i>
                <span>Approval Requests</span>
                <span id="approvalBadge" class="sidebar-notification-badge" style="display:none;background:#ffc107;color:#000;
                             font-size:10px;padding:2px 6px;border-radius:10px;
                             margin-left:auto;min-width:18px;text-align:center;
                             font-weight:700;line-height:1.2;"></span>
            </a>

            <a th:href="@{/archive}" class="sidebar-link" th:classappend="${activePage == 'archive'} ? 'active' : ''"
                data-page="archive" sec:authorize="hasRole('ADMIN')">
                <i class="fas fa-archive"></i>
                <span>Archive</span>
            </a>
        </div>
    </div>

</nav>

<script th:src="@{/js/sidebar.js}"></script>

</html>
