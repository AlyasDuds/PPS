<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Shared connectivity + office status stat cards (report page layout). -->
<div th:fragment="connectivityStatsCards" class="row mb-4">

    <!-- Active (Connected) -->
    <div class="col-xl col-md-4 col-sm-6 mb-4">
        <div class="card border-bottom-success shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-success text-uppercase mb-1">
                            Active (Connected)</div>
                        <h2 id="statConnected" class="h5 mb-0 font-weight-bold text-gray-800"
                            th:text="${connectivityStats != null ? connectivityStats.totalConnected : 0}">0</h2>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-wifi fa-2x text-success"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Newly Connected -->
    <div class="col-xl col-md-4 col-sm-6 mb-4">
        <div class="card border-bottom-success shadow h-100 py-2" style="border-bottom-color: #1cc88a !important; opacity: 0.85;">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-success text-uppercase mb-1">
                            Newly Connected</div>
                        <h2 id="statNewlyConnected" class="h5 mb-0 font-weight-bold text-gray-800"
                            th:text="${connectivityStats != null ? connectivityStats.totalNewlyConnected : 0}">0</h2>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-plus-circle fa-2x text-success"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Inactive (Disconnected) -->
    <div class="col-xl col-md-4 col-sm-6 mb-4">
        <div class="card border-bottom-danger shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-danger text-uppercase mb-1">
                            Inactive (Disconnected)</div>
                        <h2 id="statDisconnected" class="h5 mb-0 font-weight-bold text-gray-800"
                            th:text="${connectivityStats != null ? connectivityStats.totalDisconnected : 0}">0</h2>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-wifi-slash fa-2x text-danger"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Newly Disconnected -->
    <div class="col-xl col-md-4 col-sm-6 mb-4">
        <div class="card border-bottom-danger shadow h-100 py-2" style="opacity: 0.85;">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-danger text-uppercase mb-1">
                            Newly Disconnected</div>
                        <h2 id="statNewlyDisconnected" class="h5 mb-0 font-weight-bold text-gray-800"
                            th:text="${connectivityStats != null ? connectivityStats.totalNewlyDisconnected : 0}">0</h2>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-minus-circle fa-2x text-danger"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Total Offices -->
    <div class="col-xl col-md-4 col-sm-6 mb-4">
        <div class="card border-bottom-primary shadow h-100 py-2">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                            Total Offices</div>
                        <h2 id="statTotalOffices" class="h5 mb-0 font-weight-bold text-gray-800"
                            th:text="${connectivityStats != null ? connectivityStats.totalOffices : 0}">0</h2>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-building fa-2x text-primary"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Office Open -->
    <div th:unless="${activePage == 'report' or activePage == 'quarters'}" class="col-xl col-md-4 col-sm-6 mb-4">
        <div class="card shadow h-100 py-2" style="border-bottom: 0.25rem solid #17a2b8 !important;">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-uppercase mb-1" style="color:#17a2b8;">
                            Office Open</div>
                        <h2 id="statOpen" class="h5 mb-0 font-weight-bold text-gray-800"
                            th:text="${openCount != null ? openCount : 0}">0</h2>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-door-open fa-2x" style="color:#17a2b8;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Office Closed -->
    <div th:unless="${activePage == 'report' or activePage == 'quarters'}" class="col-xl col-md-4 col-sm-6 mb-4">
        <div class="card shadow h-100 py-2" style="border-bottom: 0.25rem solid #856404 !important;">
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-uppercase mb-1" style="color:#856404;">
                            Office Closed</div>
                        <h2 id="statClosed" class="h5 mb-0 font-weight-bold text-gray-800"
                            th:text="${closedCount != null ? closedCount : 0}">0</h2>
                    </div>
                    <div class="col-auto">
                        <i class="fas fa-door-closed fa-2x" style="color:#856404;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

</html>
