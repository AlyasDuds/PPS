<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POST OFFICE - Login</title>
  <link rel="icon" th:href="@{/images/icon.ico}" type="image/x-icon">
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>

<body>

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splashScreen">
    <div class="splash-content">
      <img th:src="@{/images/loading-ezgif.com-speed.gif}" src="/images/loading-ezgif.com-speed.gif" alt="Loading..."
        class="splash-gif">
      <p class="splash-text">PHLPost Office System</p>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
  <!-- ===== END SPLASH SCREEN ===== -->

  <div class="split-container" id="loginContainer" style="display:none;">

    <div class="left-section">
      <img th:src="@{/images/background.jpg}" class="background-img" alt="Background">
    </div>
    <div class="right-section">
      <div class="login-card">
        <img th:src="@{/images/asd.jpg}" class="logo" alt="Logo">
        <div class="welcome-text">
          <h1>Login to Get Started</h1>
          <p>Welcome back! Let's get you signed in.</p>
        </div>

        <form id="loginForm" method="POST" th:action="@{/login}">
          <div class="input-wrapper">
            <ion-icon name="mail-outline"></ion-icon>
            <input type="email" id="email" name="email" placeholder="Email" required>
          </div>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <ion-icon name="eye-outline" class="password-toggle" onclick="togglePassword(this)"></ion-icon>
          </div>

          <div class="remember-forgot">
            <label class="remember-label">
              <input type="checkbox" name="remember-me" id="rememberMe">
              <span class="custom-checkbox"></span>
              <span>Remember me</span>
            </label>
            <a th:href="@{/request-otp}" class="forgot-password">Forgot Password?</a>
          </div>

          <button type="submit" class="login-button">Login</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script th:src="@{/js/login.js}"></script>
</body>

</html>
