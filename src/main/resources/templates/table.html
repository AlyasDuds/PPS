<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/main-layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Post Office - PHLPost</title>
</head>

<!--
    Body data attributes are the single source of truth for JS role detection.
    table.js reads document.body.dataset.isSystemAdmin / isAreaAdmin directly.
-->
<body th:data-is-system-admin="${isSystemAdmin}"
      th:data-is-area-admin="${isAreaAdmin}">

<div th:fragment="content">
<div class="container-fluid py-4">

    <!-- ══════════════════════════════════════════════════════
         ROW 1 — Map + Search/Filter Panel
    ══════════════════════════════════════════════════════ -->
    <div class="row mb-4">

        <!-- Map card -->
        <div class="col-md-8 mb-3 mb-md-0">
            <div class="card shadow-sm h-100"
                 style="border-radius:12px;overflow:hidden;border:1px solid #e3e6f0;">
                <div class="card-header d-flex align-items-center py-2 px-3"
                     style="background:linear-gradient(135deg,#002868,#1a3a7a);border-bottom:none;">
                    <span class=" text-white" style="font-size:14px;">
                        <i class="fas fa-map-marked-alt mr-2"></i>Postal Office Locator
                    </span>
                </div>
                <div class="card-body p-3">
                    <div id="map" style="height:400px;border-radius:8px;overflow:hidden;"></div>

                    <!-- Area legend -->
                    <div class="mt-3 p-2 rounded" id="mapLegend"
                         style="background:#f8f9fc;border:1px solid #e3e6f0;">
                        <small class="d-block mb-2 text-muted text-uppercase"
                               style="font-size:10px;letter-spacing:2px;">
                            <i class="fas fa-layer-group mr-1"></i>Area Legend
                        </small>
                        <!-- System Admin sees all areas, others see only their assigned area -->
                        <div class="row" style="row-gap:4px;">
                            <div class="col-3">
                                <div class="d-flex flex-column" style="gap:5px;">
                                    <span th:if="${isSystemAdmin}" data-area="1" style="font-size:12px;"><span style="background:#FF6B6B;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 1</span>
                                    <span th:if="${isSystemAdmin}" data-area="2" style="font-size:12px;"><span style="background:#4ECDC4;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 2</span>
                                    <span th:if="${isSystemAdmin}" data-area="3" style="font-size:12px;"><span style="background:#45B7D1;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 3</span>
                                    <!-- Non-system admins see only their assigned area -->
                                    <span th:unless="${isSystemAdmin}" th:if="${userAreaId != null}" th:data-area="${userAreaId}" style="font-size:12px;">
                                        <span th:style="'background:' + ${userAreaId == 1 ? '#FF6B6B' : userAreaId == 2 ? '#4ECDC4' : userAreaId == 3 ? '#45B7D1' : userAreaId == 4 ? '#FFA07A' : userAreaId == 5 ? '#98D8C8' : userAreaId == 6 ? '#F7DC6F' : userAreaId == 7 ? '#BB8FCE' : userAreaId == 8 ? '#F8B739' : '#85C1E2'} + ';width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;'"></span>
                                        Area <span th:text="${userAreaId}"></span>
                                    </span>
                                </div>
                            </div>
                            <div class="col-3">
                                <div class="d-flex flex-column" style="gap:5px;">
                                    <span th:if="${isSystemAdmin}" data-area="4" style="font-size:12px;"><span style="background:#FFA07A;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 4</span>
                                    <span th:if="${isSystemAdmin}" data-area="5" style="font-size:12px;"><span style="background:#98D8C8;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 5</span>
                                    <span th:if="${isSystemAdmin}" data-area="6" style="font-size:12px;"><span style="background:#F7DC6F;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 6</span>
                                </div>
                            </div>
                            <div class="col-3">
                                <div class="d-flex flex-column" style="gap:5px;">
                                    <span th:if="${isSystemAdmin}" data-area="7" style="font-size:12px;"><span style="background:#BB8FCE;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 7</span>
                                    <span th:if="${isSystemAdmin}" data-area="8" style="font-size:12px;"><span style="background:#F8B739;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 8</span>
                                    <span th:if="${isSystemAdmin}" data-area="9" style="font-size:12px;"><span style="background:#85C1E2;width:10px;height:10px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:middle;"></span>Area 9</span>
                                </div>
                            </div>
                            <div class="col-3">
                                <!-- Empty column for balance -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div><!-- /col-md-8 -->

        <!-- Search + Map Filters -->
        <div class="col-md-4">
            <div class="card shadow-sm h-100"
                 style="border-radius:12px;overflow:hidden;border:1px solid #e3e6f0;">
                <div class="card-header d-flex align-items-center py-2 px-3"
                     style="background:linear-gradient(135deg,#4e73df,#224abe);border-bottom:none;">
                    <span class=" text-white" style="font-size:14px;">
                        <i class="fas fa-search-location mr-2"></i>Search &amp; Map Filters
                    </span>
                </div>
                <div class="card-body p-3 d-flex flex-column" style="gap:14px;">

                    <!-- Search input -->
                    <div>
                        <label class="d-block mb-1  text-muted text-uppercase"
                               style="font-size:10px;letter-spacing:.5px;">
                            <i class="fas fa-search mr-1"></i> Search Location
                        </label>
                        <div style="position:relative;">
                            <input type="text" id="searchInput" class="form-control"
                                   placeholder="Enter post office name..."
                                   style="border-radius:8px;border:1px solid #d1d3e2;font-size:13px;padding-right:36px;">
                            <i 
                               style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                      color:#b0b7c3;font-size:13px;pointer-events:none;z-index:1;"></i>
                        </div>
                    </div>

                    <!-- Connectivity Status filter -->
                    <div>
                        <label class="d-block mb-1  text-muted text-uppercase"
                               style="font-size:10px;letter-spacing:.5px;">
                            <i class="fas fa-wifi mr-1"></i>Connectivity Status
                        </label>
                        <select id="statusFilter" class="form-control"
                                style="border-radius:8px;border:1px solid #d1d3e2;font-size:13px;">
                            <option value="">All Status</option>
                            <option value="Active">&#9679; Active (Connected)</option>
                            <option value="Inactive">&#9679; Inactive (Disconnected)</option>
                        </select>
                    </div>

                  <!-- Areas (Select Multiple) -->
                    <div th:if="${isSystemAdmin}">
                        <label class="d-block mb-1  text-muted text-uppercase"
                               style="font-size:10px;letter-spacing:.5px;">
                            <i class="fas fa-map mr-1"></i>Areas (Select Multiple)
                        </label>
                        <!-- System Admin gets checkboxes -->
                        <div>
                            <div class="form-check mb-2">
                                <input type="checkbox" class="form-check-input" id="selectAllAreas">
                                <label class="form-check-label" for="selectAllAreas">
                                    Select All / Deselect All
                                </label>
                            </div>
                            <div class="d-flex flex-wrap" style="gap:8px;">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area1" value="1">
                                    <label class="form-check-label" for="area1">Area 1</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area2" value="2">
                                    <label class="form-check-label" for="area2">Area 2</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area3" value="3">
                                    <label class="form-check-label" for="area3">Area 3</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area4" value="4">
                                    <label class="form-check-label" for="area4">Area 4</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area5" value="5">
                                    <label class="form-check-label" for="area5">Area 5</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area6" value="6">
                                    <label class="form-check-label" for="area6">Area 6</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area7" value="7">
                                    <label class="form-check-label" for="area7">Area 7</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area8" value="8">
                                    <label class="form-check-label" for="area8">Area 8</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input area-checkbox" id="area9" value="9">
                                    <label class="form-check-label" for="area9">Area 9</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Clear filters — after all filter controls (search, connectivity, areas when shown) -->
                    <div class="mt-2">
                        <button type="button" id="clearFilters" class="btn btn-outline-secondary w-100"
                                style="border-radius:8px;font-size:13px;">
                            <i class="fas fa-times mr-1"></i>Clear Filters
                        </button>
                    </div>
                </div>
            </div>
        </div><!-- /col-md-4 -->

    </div><!-- /row (map row) -->


</div><!-- /container-fluid -->

<!-- ── Post Office Profile Modal ─────────────────────────────────────── -->
<div class="modal fade" id="profileModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title ">
                    <i class="fas fa-map-marker-alt mr-2"></i>Post Office Profile
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body" id="profileModalBody">
                <div class="text-center py-4">
                    <i class="fas fa-spinner fa-spin fa-2x text-primary"></i>
                    <p class="text-muted mt-2">Loading profile...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">
                    <i class="fas fa-times mr-1"></i>Close
                </button>
                <button type="button" class="btn btn-primary" id="viewFullProfileBtn">
                    <i class="fas fa-external-link-alt mr-1"></i>View Full Profile
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ── Archive Reason Modal ───────────────────────────────────────────── -->
<div class="modal fade" id="archiveReasonModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-warning text-white">
                <h5 class="modal-title ">
                    <i class="fas fa-archive mr-2"></i>Archive Post Office
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-3">
                    You are about to archive <span id="archiveOfficeName"></span>.
                    This office will be hidden from all views but can be restored later.
                </p>
                <div class="form-group">
                    <label for="archiveReasonInput">
                        Reason for archiving <small class="text-muted">(optional)</small>
                    </label>
                    <textarea id="archiveReasonInput" class="form-control" rows="3"
                              placeholder="e.g. Office closed, Duplicate record, Under review..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">
                    <i class="fas fa-times mr-1"></i>Cancel
                </button>
                <button type="button" class="btn btn-warning" id="confirmArchiveBtn">
                    <i class="fas fa-archive mr-1"></i>Archive
                </button>
            </div>
        </div>
    </div>
</div>

</div><!-- /th:fragment -->
</body>
</html>
